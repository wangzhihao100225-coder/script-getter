name: Bili Sync

on:
  schedule:
    - cron: '0 2 * * *' # 北京时间 10 点
  workflow_dispatch: # 允许手动点按钮

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - run: go run main.go
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto Sync"
